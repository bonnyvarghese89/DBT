version: 2

models:
  - name: fact_goods_received

    columns:
      - name: item_sk
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_item')
                field: item_sk

      - name: date_sk
        tests:
          - relationships:
              arguments:
                to: ref('dim_calendar')
                field: date_sk